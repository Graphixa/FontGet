# FontGet configuration file.
# Edit values as needed, then run `fontget config validate` to check the file.
#
# Note: on first-run and `fontget config reset`, this file reverts back to defaults.

Version: "2.0"

Configuration:
  DefaultEditor: ""  # Default editor command (e.g., 'code', 'notepad.exe', 'nano')

Logging:
  LogPath: "$home/.fontget/logs/fontget.log"  # Path to log file
  MaxLogSize: "10MB"  # Maximum size per log file before rotation
  MaxLogFiles: 5  # Number of rotated log files to keep

Network:
  RequestTimeout: "10s"  # Timeout for HTTP requests
  DownloadTimeout: "30s"  # Timeout for font downloads
  EnableExternalDownloadFallback: true  # Allow optional external download tools (curl/wget/PowerShell) on failed downloads
  DownloadUserAgent: "Mozilla/5.0 (compatible; FontGet/1.0; +https://github.com/Graphixa/FontGet)"  # HTTP User-Agent for downloads (and external fallback tools)

Search:
  ResultLimit: 0  # Maximum search results to display (0 = unlimited)
  EnablePopularitySort: true  # Sort results by popularity, then alphabetically

Update:
  CheckForUpdates: true  # Check for updates on startup
  UpdateCheckInterval: 24  # Hours between update checks
  LastUpdateCheck: ""  # Last check timestamp (auto-updated)

Theme:
  Name: "catppuccin"  # UI theme name (e.g., "catppuccin", "gruvbox", "system")
  Use256ColorSpace: false  # Set true to downsample theme colors to ANSI 256 for terminals without true color (e.g. Apple Terminal)
