name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"

      # go-winres runs in GoReleaser's before hooks; it works on Linux and generates .syso for the Windows binary (icon + version info).
      - name: Install go-winres (for Windows icon embedding)
        run: go install github.com/tc-hib/go-winres@latest

      - name: Run tests
        run: go test ./...

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: check

      # Create draft release only. No push to any external repo until Chocolatey succeeds (publish-release job).
      - name: Run GoReleaser (draft only, no external pushes)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=chocolatey,winget,aur_sources,homebrew,scoop --draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  chocolatey:
    name: Build Chocolatey Package
    runs-on: windows-latest
    needs: release
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"

      # Ensure Chocolatey is available (windows-latest usually has it; install if missing, per community pattern)
      - name: Install Chocolatey
        shell: pwsh
        run: |
          if (-not (Get-Command choco -ErrorAction SilentlyContinue)) {
            Set-ExecutionPolicy Bypass -Scope Process -Force
            [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
            iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          }

      - name: Add Chocolatey to PATH
        shell: pwsh
        run: $env:Path += ";$env:ProgramData\chocolatey\bin"

      - name: Verify Chocolatey installation
        shell: pwsh
        run: choco --version

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          $version = $tag -replace '^v', ''
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Packing Chocolatey for version $version"

      - name: Pack Chocolatey package
        shell: pwsh
        run: |
          choco pack build/chocolatey/fontget.nuspec --version ${{ steps.version.outputs.VERSION }} --output-directory nupkg
          Get-ChildItem nupkg

      - name: Install .NET (for NuGet push)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Push to Chocolatey
        shell: pwsh
        run: |
          $nupkg = Get-ChildItem nupkg/*.nupkg | Select-Object -First 1
          if (-not $nupkg) { Write-Error "No nupkg found"; exit 1 }
          dotnet nuget push $nupkg.FullName --api-key "$env:CHOCOLATEY_API_KEY" --source "https://push.chocolatey.org/"
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}

  # Only after Chocolatey succeeds: publish the release and push to Winget + AUR.
  # Running GoReleaser again (no --draft, skip=chocolatey) publishes the draft and runs Winget + AUR.
  publish-release:
    name: Publish release and push to Winget/AUR
    runs-on: ubuntu-latest
    needs: [release, chocolatey]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"

      - name: Install go-winres (for Windows icon embedding)
        run: go install github.com/tc-hib/go-winres@latest

      # Publish the release (undraft) and push to Winget + AUR. Chocolatey already done on Windows.
      - name: Run GoReleaser (publish + Winget + AUR)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=chocolatey
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          WINGET_PR_TOKEN: ${{ secrets.WINGET_PR_TOKEN }}
          AUR_PRIVATE_KEY: ${{ secrets.AUR_PRIVATE_KEY }}